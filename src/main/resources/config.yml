# BreakDrop Configuration

# ブロックを破壊した際の処理(ドロップ・スキル実行)のリストです．
# 複数の設定を追加することができます．
drops:
  - functions:
      # 実行する処理(スキル)のリスト
      - skills: [breakskill2] # MythicMobsのスキル名を指定
        chance: 0.008 # 実行される確率(0.0 ～ 1.0)
      - skills: [sagyouherumetto]
        chance: 1
    # 処理が実行されるための条件(省略すると常に実行されます)
    condition:
      op: OR # OR(いずれかを満たせばOK)またはAND(すべて満たせばOK)
      conditions:
        - inventory:
            - mythic_type: sagyouherumetto # 指定したMythicMobsのアイテムを持っているか
              slot: helmet # 装備スロット(helmet, chestplate, leggings, boots, mainhand, offhandなど．省略時は全スロットを判定します．)
        - inventory:
            - type: leather_helmet # バニラのアイテム(Material名)
              display_name: '&6&l作業&e&lヘルメット' # アイテムの表示名
              slot: helmet
